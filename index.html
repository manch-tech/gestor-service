<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gestor de Obras - Manoel Pedra</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">MP</div>
    <h1>Gestor de Obras</h1>
    <span class="badge">🟢 wybgqdreqylrojdxijey - ONLINE</span>
  </div>
  <div id="authBox" class="card">
    <div class="tabs">
      <button id="tabLogin" class="tab active" onclick="showTab('login')">Entrar</button>
      <button id="tabCad" class="tab" onclick="showTab('cadastro')">Cadastrar Usuário</button>
    </div>
    <input id="email" type="email" placeholder="E-mail">
    <input id="senha" type="password" placeholder="Senha (min 6)">
    <button class="btn-primary" onclick="handleAuth()">Entrar no App</button>
    <p id="msg" class="msg"></p>
  </div>
  <div id="appBox" class="card hidden">
    <div class="topbar">
      <span id="userEmail"></span>
      <button class="btn-small" onclick="logout()">Sair</button>
    </div>
    <div class="grid">
      <div class="mini-card">
        <h3>+ Cliente</h3>
        <input id="cliNome" placeholder="Nome do cliente">
        <input id="cliTel" placeholder="Telefone / Whats">
        <input id="cliEnd" placeholder="Endereço da obra">
        <button class="btn-primary" onclick="salvarCliente()">Salvar Cliente</button>
      </div>
      <div class="mini-card">
        <h3>+ Serviço</h3>
        <input id="servNome" placeholder="Ex: Reboco interno">
        <select id="servCat"><option>Alvenaria</option><option>Elétrica</option><option>Hidráulica</option><option>Pintura</option><option>Acabamento</option></select>
        <div class="row"><input id="servUn" placeholder="m²"><input id="servPreco" type="number" placeholder="Preço base"></div>
        <button class="btn-primary" onclick="salvarServico()">Salvar Serviço</button>
      </div>
      <div class="mini-card">
        <h3>+ Orçamento</h3>
        <input id="orcTitulo" placeholder="Título - Ex: Reforma apto 202">
        <input id="orcClienteId" placeholder="ID do cliente (lista abaixo)">
        <textarea id="orcItens" placeholder='Itens em JSON ex: [{"serv":"Reboco","qtd":50,"preco":30}]'></textarea>
        <input id="orcTotal" type="number" placeholder="Total R$">
        <button class="btn-primary" onclick="salvarOrcamento()">Salvar Orçamento</button>
      </div>
    </div>
    <div class="list">
      <h3>Clientes Recentes</h3>
      <div id="listaClientes"></div>
    </div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
